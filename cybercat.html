<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Cat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    cursor:crosshair;
}

canvas{
    display:block;
    background:black;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

const mouse = {
    x:w/2,
    y:h/2
};

window.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Joint{

    constructor(x,y,length){

        this.x = x;
        this.y = y;
        this.length = length;

        this.vx = 0;
        this.vy = 0;
    }

    follow(tx,ty){

        const dx = tx - this.x;
        const dy = ty - this.y;

        const angle = Math.atan2(dy,dx);

        const nx = tx - Math.cos(angle) * this.length;
        const ny = ty - Math.sin(angle) * this.length;

        // slower movement
        this.vx += (nx - this.x) * 0.16;
        this.vy += (ny - this.y) * 0.16;

        // smooth slow motion
        this.vx *= 0.55;
        this.vy *= 0.55;

        this.x += this.vx;
        this.y += this.vy;

        return {
            x:this.x,
            y:this.y
        };
    }
}

const spine = [];

for(let i=0;i<60;i++){

    spine.push(
        new Joint(
            w/2,
            h/2,
            9
        )
    );

}

const particles = [];

function addParticle(x,y,color){

    particles.push({

        x,
        y,
        color,

        vx:(Math.random()-0.5)*1.5,
        vy:(Math.random()-0.5)*1.5,

        life:1,
        size:Math.random()*2+1
    });

}

function line(x1,y1,x2,y2){

    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

}

function getAngle(i){

    const a = spine[Math.max(0,i-1)];
    const b = spine[i];

    return Math.atan2(
        a.y - b.y,
        a.x - b.x
    );
}

function drawPaw(x,y,angle){

    for(let i=-2;i<=2;i++){

        line(
            x,
            y,
            x + Math.cos(angle+i*0.25)*10,
            y + Math.sin(angle+i*0.25)*10
        );

    }
}

function drawLeg(index,side,back=false){

    const p = spine[index];

    const angle = getAngle(index);

    // slower walk animation
    const walk =
        Math.sin(Date.now()*0.0018 + index) * 0.25;

    const upper = back ? 46 : 36;
    const lower = back ? 38 : 30;

    const kneeX =
        p.x +
        Math.cos(angle + side*(1.3+walk))*upper;

    const kneeY =
        p.y +
        Math.sin(angle + side*(1.3+walk))*upper;

    const footX =
        kneeX +
        Math.cos(angle + side*(2.1-walk))*lower;

    const footY =
        kneeY +
        Math.sin(angle + side*(2.1-walk))*lower;

    line(p.x,p.y,kneeX,kneeY);

    line(kneeX,kneeY,footX,footY);

    drawPaw(
        footX,
        footY,
        angle + side*2.2
    );
}

function drawHeart(x,y,size){

    ctx.save();

    ctx.strokeStyle = "#ff00ff";
    ctx.shadowColor = "#ff00ff";
    ctx.shadowBlur = 25;
    ctx.lineWidth = 3;

    ctx.beginPath();

    for(let t=0;t<Math.PI*2;t+=0.04){

        const px =
            16 * Math.pow(Math.sin(t),3);

        const py =
            -(
                13*Math.cos(t)
                - 5*Math.cos(2*t)
                - 2*Math.cos(3*t)
                - Math.cos(4*t)
            );

        const hx = x + px*size;
        const hy = y + py*size;

        if(t===0){
            ctx.moveTo(hx,hy);
        }else{
            ctx.lineTo(hx,hy);
        }
    }

    ctx.closePath();
    ctx.stroke();

    ctx.restore();
}

function drawCat(){

    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffff";

    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;

    // spine
    ctx.beginPath();

    ctx.moveTo(
        spine[0].x,
        spine[0].y
    );

    for(let i=1;i<spine.length;i++){

        ctx.lineTo(
            spine[i].x,
            spine[i].y
        );

    }

    ctx.stroke();

    // ribs
    for(let i=8;i<30;i+=2){

        const p = spine[i];

        const angle = getAngle(i);

        const size =
            30 - (i-8)*0.7;

        line(
            p.x,
            p.y,
            p.x +
            Math.cos(angle+Math.PI/2)*size,
            p.y +
            Math.sin(angle+Math.PI/2)*size
        );

        line(
            p.x,
            p.y,
            p.x +
            Math.cos(angle-Math.PI/2)*size,
            p.y +
            Math.sin(angle-Math.PI/2)*size
        );
    }

    // legs
    drawLeg(10,1,false);
    drawLeg(10,-1,false);

    drawLeg(30,1,true);
    drawLeg(30,-1,true);

    // tail
    ctx.strokeStyle = "#00ffff";
    ctx.shadowColor = "#00ffff";
    ctx.lineWidth = 3;

    ctx.beginPath();

    for(let i=31;i<spine.length;i++){

        if(i===31){

            ctx.moveTo(
                spine[i].x,
                spine[i].y
            );

        }else{

            ctx.lineTo(
                spine[i].x,
                spine[i].y
            );

        }
    }

    ctx.stroke();

    // head
    const head = spine[0];
    const neck = spine[1];

    const angle = Math.atan2(
        head.y-neck.y,
        head.x-neck.x
    );

    const hx =
        head.x +
        Math.cos(angle)*30;

    const hy =
        head.y +
        Math.sin(angle)*30;

    ctx.strokeStyle = "#ffffff";
    ctx.shadowColor = "#ff00ff";
    ctx.lineWidth = 2;

    ctx.beginPath();

    ctx.arc(
        hx,
        hy,
        24,
        0,
        Math.PI*2
    );

    ctx.stroke();

    // ears
    ctx.beginPath();

    ctx.moveTo(
        hx + Math.cos(angle-0.8)*15,
        hy + Math.sin(angle-0.8)*15
    );

    ctx.lineTo(
        hx + Math.cos(angle-1.55)*45,
        hy + Math.sin(angle-1.55)*45
    );

    ctx.lineTo(
        hx + Math.cos(angle-0.15)*15,
        hy + Math.sin(angle-0.15)*15
    );

    ctx.moveTo(
        hx + Math.cos(angle+0.8)*15,
        hy + Math.sin(angle+0.8)*15
    );

    ctx.lineTo(
        hx + Math.cos(angle+1.55)*45,
        hy + Math.sin(angle+1.55)*45
    );

    ctx.lineTo(
        hx + Math.cos(angle+0.15)*15,
        hy + Math.sin(angle+0.15)*15
    );

    ctx.stroke();

    // eyes
    ctx.fillStyle = "#ff00ff";
    ctx.shadowColor = "#ff00ff";
    ctx.shadowBlur = 30;

    ctx.beginPath();

    ctx.arc(
        hx + Math.cos(angle-0.45)*11,
        hy + Math.sin(angle-0.45)*11,
        4,
        0,
        Math.PI*2
    );

    ctx.arc(
        hx + Math.cos(angle+0.45)*11,
        hy + Math.sin(angle+0.45)*11,
        4,
        0,
        Math.PI*2
    );

    ctx.fill();

    // whiskers
    ctx.strokeStyle = "#00ffff";
    ctx.shadowColor = "#00ffff";
    ctx.lineWidth = 1.5;

    for(let s of [-1,1]){

        for(let i=-1;i<=1;i++){

            line(
                hx,
                hy,
                hx +
                Math.cos(angle+s*1.2+i*0.18)*45,
                hy +
                Math.sin(angle+s*1.2+i*0.18)*45
            );

        }
    }

    // heart
    drawHeart(
        hx + 55,
        hy - 45,
        1
    );
}

function drawParticles(){

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.life -= 0.01;

        ctx.globalAlpha = p.life;

        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 20;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fill();

        if(p.life <= 0){

            particles.splice(i,1);

        }
    }

    ctx.globalAlpha = 1;
}

function animate(){

    // REAL black background
    ctx.fillStyle = "#000000";
    ctx.fillRect(0,0,w,h);

    let target = {

        x:
            mouse.x +
            Math.sin(Date.now()*0.001)*10,

        y:
            mouse.y +
            Math.cos(Date.now()*0.001)*10
    };

    for(let i=0;i<spine.length;i++){

        target =
            spine[i].follow(
                target.x,
                target.y
            );

    }

    addParticle(
        spine[0].x,
        spine[0].y,
        "#ff00ff"
    );

    addParticle(
        spine[20].x,
        spine[20].y,
        "#00ffff"
    );

    drawCat();

    drawParticles();

    requestAnimationFrame(animate);
}

animate();

</script>
</body>
</html>
